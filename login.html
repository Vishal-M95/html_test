<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <style>
      form {
        width: 270px;
        height: 210px;
        border: 2px inset;
        border-radius: 6px;
        border-right: inset;
      }

      p {
        text-align: center;
        margin: 0;
        font-size: 20px;
        color: crimson;
      }

      label {
        text-transform: capitalize;
        color: brown;
        padding: 5px;
      }
      input {
        width: 98%;
        height: 23px;
        background-color: antiquewhite;
        border: 1px solid antiquewhite;
        border-radius: 5px;
        margin-top: 5px;
      }
      #submit {
        margin-top: 10px;
        width: 34%;
        height: 25%;
        color: gray;
        font-size: 19px;
        font-weight: 300;
        font-family: math;
        margin-left: 5px;
      }
      #submit:hover {
        cursor: pointer;
        color: azure;
        background-color: bisque;
      }
    </style>
  </head>
  <body>
    <form action="/login.html" target="_blank">
      <p>Login Form!</p>
      <hr />
      <label for="username">user id</label>
      <input
        type="text"
        name="username"
        id="username"
        value=""
        required
        minlength="5"
        maxlength="10"
      />
      <label for="pass">user password</label>
      <input
        type="password"
        name="pass"
        id="pass"
        placeholder="password"
        required
      />
      <input type="submit" name="submit" id="submit" />
      <input type="reset" name="" id="submit" />
    </form>
  </body>
</html>
